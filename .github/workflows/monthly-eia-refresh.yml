name: Monthly EIA Price Refresh

# Runs on the 28th of each month at 10:00 UTC (06:00 ET / 07:00 EDT).
# EIA typically publishes monthly residential data by mid-month; the 28th
# provides a comfortable buffer for late releases and revisions.
on:
  schedule:
    - cron: "0 10 28 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-eia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest EIA residential prices
        id: fetch
        run: |
          set -o pipefail
          npm run data:update:eia:res 2>&1 | tee /tmp/eia-output.log
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      # Re-pin known-bad EIA source values (e.g. the corrected Maryland
      # 2026-03 price) over the freshly-fetched CSV BEFORE the anomaly guard
      # runs, so a corrected state passes the guard while every other state
      # updates normally. This is a fixer (always exits 0), not a gate.
      - name: Apply known EIA corrections
        run: npm run data:apply:corrections

      # Block the refresh if any state's residential price moved more than the
      # configured month-over-month threshold (default 25%) and is not
      # allowlisted. On a flagged state this step exits non-zero, so the
      # snapshot/knowledge/commit steps below never run and nothing is pushed,
      # preserving the last-good committed data for human review.
      - name: Guard against month-over-month price anomalies
        run: npm run data:check:mom

      # Always regenerate snapshot/history artifacts from the canonical CSV.
      # This keeps every downstream layer (history, v1/v2, latest.json, and
      # `src/data/raw/states.raw.ts`) consistent with the on-disk CSV even if
      # the updater no-oped because EIA had nothing newer than last refresh.
      - name: Regenerate snapshot, history, and RAW_STATES artifacts
        run: npm run data:build:snapshots:eia

      # Regenerate the committed public artifacts (datasets, graph.json,
      # discovery-graph.json, electricity-comparison-pairs.json) so they stay
      # in sync with the refreshed snapshot data. Per
      # docs/GENERATED_OUTPUT_POLICY.md these generated outputs are part of the
      # repo contract; without this step they drift a month behind every
      # refresh and re-dirty the working tree on the next local build.
      - name: Regenerate public knowledge and dataset artifacts
        run: npm run knowledge:build

      - name: Verify generated knowledge artifacts
        run: npm run knowledge:verify

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/normalized/eia/retail_res_monthly_2000_present.csv \
            data/raw/eia/retail_res_monthly_latest_refresh.json \
            data/eia/corrections.json \
            data/eia/anomaly-allowlist.json \
            src/data/history.generated.ts \
            src/data/history.generated.json \
            src/data/raw/states.raw.ts \
            src/data/snapshots/ \
            public/datasets/electricity-prices-by-state.json \
            public/datasets/electricity-prices-by-state.csv \
            public/datasets/electricity-rankings.json \
            public/datasets/electricity-rankings.csv \
            public/discovery-graph.json \
            public/electricity-comparison-pairs.json \
            public/graph.json
          git diff --cached --quiet && echo "Nothing staged, skipping commit." && exit 0
          git commit -m "chore: update EIA residential electricity prices (monthly refresh)"
          git push

      # If any earlier step failed (most importantly the month-over-month
      # anomaly guard), open or update a tracking issue so a human reviews the
      # blocked refresh. This does not change the job outcome: the run still
      # ends red because a prior step failed.
      - name: Open issue on failed refresh
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "Monthly EIA refresh blocked";
            const body = [
              "The scheduled EIA refresh failed before committing (likely the",
              "month-over-month anomaly guard). Nothing was committed or pushed,",
              "so the last-good committed data is preserved.",
              "",
              `Run: ${runUrl}`,
              "",
              "To resolve, see scripts/eia and docs/EIA_REFRESH_RUNBOOK.md:",
              "- Genuine EIA data error -> add a data/eia/corrections.json entry.",
              "- Real but volatile move -> add a data/eia/anomaly-allowlist.json entry.",
            ].join("\n");
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "eia-refresh",
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["eia-refresh"],
              });
            }
